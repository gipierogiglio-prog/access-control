# Deploy access-control - Azure Pipelines
trigger:
  branches:
    include: [main]

variables:
  - group: devgiglio-env
  - group: devgiglio-secrets
  - name: APP_NAME
    value: access-control

pool: Default

steps:
  - bash: |
      echo $(GITHUB_TOKEN) | docker login ghcr.io -u gipierogiglio-prog --password-stdin
      docker build -t ghcr.io/gipierogiglio-prog/access-control:latest .
      docker push ghcr.io/gipierogiglio-prog/access-control:latest
    displayName: "Build & Push"

  - bash: |
      cd /opt/devgiglio
      docker compose rm -fsv access-control 2>/dev/null || true
      docker pull ghcr.io/gipierogiglio-prog/access-control:latest
      docker compose up -d --force-recreate access-control
    displayName: "Deploy"
